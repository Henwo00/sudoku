<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sudoku</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">

    <!-- ── Menu ── -->
    <div id="menu-screen" class="screen active">
      <div class="menu-header">
        <div class="logo">◈</div>
        <h1>Sudoku</h1>
        <p class="tagline">Pick your challenge</p>
      </div>
      <div class="difficulty-grid">
        <button class="difficulty-card" data-difficulty="easy">
          <span class="diff-icon">☀️</span>
          <span class="diff-name">Easy</span>
          <span class="diff-desc">Relaxed pace</span>
          <span class="diff-best" data-best="easy">--:--</span>
        </button>
        <button class="difficulty-card" data-difficulty="medium">
          <span class="diff-icon">🌤️</span>
          <span class="diff-name">Medium</span>
          <span class="diff-desc">Some thought needed</span>
          <span class="diff-best" data-best="medium">--:--</span>
        </button>
        <button class="difficulty-card" data-difficulty="hard">
          <span class="diff-icon">🌥️</span>
          <span class="diff-name">Hard</span>
          <span class="diff-desc">Think it through</span>
          <span class="diff-best" data-best="hard">--:--</span>
        </button>
        <button class="difficulty-card" data-difficulty="expert">
          <span class="diff-icon">⚡</span>
          <span class="diff-name">Expert</span>
          <span class="diff-desc">Maximum challenge</span>
          <span class="diff-best" data-best="expert">--:--</span>
        </button>
      </div>
      <div id="resume-banner" class="resume-banner hidden">
        <span>Unfinished game waiting…</span>
        <button id="resume-btn">Resume</button>
      </div>
    </div>

    <!-- ── Generating ── -->
    <div id="generating-screen" class="screen generating">
      <div class="spinner"></div>
      <p>Generating puzzle…</p>
    </div>

    <!-- ── Game ── -->
    <div id="game-screen" class="screen">
      <header class="game-header">
        <button id="back-btn" class="icon-btn" title="Back to menu">←</button>
        <div class="header-center">
          <div id="difficulty-label" class="diff-badge">Easy</div>
          <div id="timer" class="timer">00:00</div>
        </div>
        <div id="mistake-counter" class="mistakes">✕ 0/3</div>
        <button id="pause-btn" class="icon-btn" title="Pause (Esc)">⏸</button>
      </header>

      <div class="board-wrapper">
        <div id="board" class="board"></div>
        <div id="pause-overlay" class="pause-overlay hidden">
          <div class="pause-content">
            <div class="pause-icon">⏸</div>
            <p>Paused</p>
            <button id="resume-game-btn" class="btn-primary">Resume</button>
          </div>
        </div>
      </div>

      <div class="controls">
        <div class="ctrl-row">
          <button class="ctrl-btn" id="undo-btn" title="Undo (Ctrl+Z)">
            <span class="ctrl-icon">↩</span>
            <span class="ctrl-label">Undo</span>
          </button>
          <button class="ctrl-btn" id="erase-btn" title="Erase (Del)">
            <span class="ctrl-icon">⌫</span>
            <span class="ctrl-label">Erase</span>
          </button>
          <button class="ctrl-btn" id="notes-btn" title="Toggle notes (N)">
            <span class="ctrl-icon">✏</span>
            <span class="ctrl-label">Notes</span>
          </button>
        </div>
        <div id="numpad" class="numpad"></div>
      </div>
    </div>

    <!-- ── Win Modal ── -->
    <div id="win-modal" class="modal hidden">
      <div class="modal-box">
        <div class="modal-icon">🎉</div>
        <h2>Puzzle Solved!</h2>
        <div id="win-diff" class="modal-sub"></div>
        <div id="win-time" class="modal-time"></div>
        <div id="win-record" class="modal-record hidden">🏆 New Record!</div>
        <div id="win-mistakes" class="modal-note"></div>
        <div class="modal-btns">
          <button id="win-new-btn" class="btn-primary">New Game</button>
          <button id="win-same-btn" class="btn-secondary">Same Difficulty</button>
        </div>
      </div>
    </div>

    <!-- ── Fail Modal ── -->
    <div id="fail-modal" class="modal hidden">
      <div class="modal-box">
        <div class="modal-icon">💔</div>
        <h2>Too Many Mistakes</h2>
        <p class="modal-note">3 mistakes reached. Keep practicing!</p>
        <div class="modal-btns">
          <button id="fail-new-btn" class="btn-primary">New Game</button>
          <button id="fail-retry-btn" class="btn-secondary">Try Again</button>
        </div>
      </div>
    </div>

  </div>
  <script src="js/generator.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ui.js"></script>
</body>
</html>
